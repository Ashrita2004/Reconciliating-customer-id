<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxKart Identity Resolution Portal</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #231f81;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #bcbfc6;
            --border: #334155;
            --accent: #10b981;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            height: 250px;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.4)), 
                        url('background.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        header h1 { font-size: 3.5rem; margin: 0; letter-spacing: -1px; }
        header p { color: var(--text-muted); margin-top: 10px; font-size: 1.1rem; }

        .container {
            display: flex; 
            align-items: stretch; 
            gap: 2rem;
            max-width: 1300px;
            margin: -50px auto 40px;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .card { 
            background: var(--card-bg); 
            padding: 2rem; 
            border-radius: 16px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
            border: 1px solid var(--border);
            flex: 1; 
            display: flex;
            flex-direction: column;
        }

        .card-content {
            flex-grow: 1; 
        }

        h2 { margin-top: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 10px; }
        
        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.7rem; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        
        input { 
            width: 100%; padding: 12px; background: #0f172a; border: 1px solid var(--border);
            border-radius: 8px; color: white; box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 14px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
            transition: all 0.2s; margin-bottom: 1rem;
        }

        /* scrollable JSON area */
        pre { 
            background: #000; padding: 15px; font-size: 0.85rem; color: var(--accent);
            border-radius: 8px; overflow: auto; border: 1px solid var(--border);
            height: 180px; 
            margin: 0;
        }

        .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
        .insight-item { 
            background: #0f172a; padding: 15px; border-radius: 10px; border: 1px solid var(--border);
        }
        .insight-label { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; }
        .insight-value { font-size: 0.95rem; font-weight: 600; color: #fff; word-break: break-all; }
        
        .tag { 
            display: inline-block; padding: 2px 8px; border-radius: 4px; 
            font-size: 0.75rem; background: rgba(99, 102, 241, 0.2); 
            color: var(--primary); margin: 2px; border: 1px solid var(--primary);
        }

        .loader {
            display: none; width: 16px; height: 16px; border: 2px solid #fff;
            border-bottom-color: transparent; border-radius: 50%;
            animation: rotation 1s linear infinite; margin-right: 10px;
        }
        .history-btn {
            background: transparent; border: 1px solid var(--primary); color: var(--primary);
            padding: 6px 12px; font-size: 0.8rem; width: auto; cursor: pointer; border-radius: 6px;
        }
        .history-btn:hover { background: var(--primary); color: white; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); width: 90%; max-width: 850px; max-height: 80vh;
            border-radius: 16px; border: 1px solid var(--border); padding: 2rem;
            overflow-y: auto; position: relative;
        }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.85rem; }
        .history-table th { color: var(--text-muted); text-align: left; padding: 12px; border-bottom: 1px solid var(--border); }
        .history-table td { padding: 12px; border-bottom: 1px solid var(--border); }
        .close-modal { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-muted); }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .container { flex-direction: column; margin-top: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FluxKart Identity Resolution</h1>
        <p>One Identity. Infinite Touchpoints.</p>
    </header>

    <div class="container">
        <div class="card">
            <h2><i class="fas fa-search"></i> Resolution Tool</h2>
            <div class="card-content">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="e.g. alex@fluxkart.com">
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="text" id="phone" placeholder="e.g. 123456">
                </div>
                <button id="submitBtn" onclick="resolveIdentity()">
                    <span style="display:flex; align-items:center; justify-content:center;">
                        <span id="loader" class="loader"></span>
                        <span id="btnText">Identify Customer</span>
                    </span>
                </button>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <label>Raw Data (JSON)</label>
                    <small style="cursor:pointer; color:var(--primary); font-size: 0.7rem;" onclick="copyToClipboard()">COPY</small>
                </div>
                <pre id="output">Waiting for query...</pre>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="margin:0;"><i class="fas fa-address-card"></i> Visual Insights</h2>
                <button class="history-btn" onclick="fetchHistory()">
                    <i class="fas fa-history"></i> View Logs
                </button>
            </div>
            <div id="visualContent" class="card-content">
                <div style="text-align: center; padding: 60px 20px; color: var(--text-muted);">
                    <i class="fas fa-id-badge" style="font-size: 3rem; margin-bottom: 1.5rem; opacity: 0.3;"></i>
                    <p>Resolution details will appear here after search.</p>
                </div>
            </div>
        </div>
    </div>
    <div id="historyModal" class="modal-overlay" onclick="closeHistory()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-times close-modal" onclick="closeHistory()"></i>
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2 style="color: var(--primary); margin:0;"><i class="fas fa-database"></i> Audit Logs</h2>
                <button onclick="clearLogs()" style="width: auto; background: #ef4444; font-size: 0.7rem; padding: 6px 12px;">Clear Database</button>
            </div>
            <div id="historyList" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        async function resolveIdentity() {
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const outputEl = document.getElementById('output');
            const visualEl = document.getElementById('visualContent');
            const btn = document.getElementById('submitBtn');
            const loader = document.getElementById('loader');

            if (!email && !phone) return alert("Please enter at least one field.");

            btn.disabled = true;
            loader.style.display = "inline-block";
            outputEl.textContent = "Querying FluxKart Database...";

            try {

                await new Promise(r => setTimeout(r, 800));
                
                const response = await fetch('/identify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email || null, phoneNumber: phone || null })
                });
                
                const data = await response.json();
                outputEl.textContent = JSON.stringify(data, null, 2);

                visualEl.innerHTML = `
                    <div class="insight-item" style="border-left: 4px solid var(--accent); margin-bottom: 1.5rem;">
                        <div class="insight-label">Cluster Status</div>
                        <div class="insight-value" style="color: var(--accent); font-size: 1.2rem;">
                            <i class="fas fa-check-circle"></i> Identity Resolved Successfully
                        </div>
                    </div>
                    
                    <div class="insight-grid">
                        <div class="insight-item">
                            <div class="insight-label">Primary ID</div>
                            <div class="insight-value">#${data.contact?.primaryContactId || 'N/A'}</div>
                        </div>
                        <div class="insight-item">
                            <div class="insight-label">Total Links</div>
                            <div class="insight-value">${data.contact?.secondaryContactIds?.length + 1 || 3} Entities</div>
                        </div>
                        <div class="insight-item" style="grid-column: span 2;">
                            <div class="insight-label">Verified Emails</div>
                            <div class="insight-value">${(data.contact?.emails || [email]).map(e => `<span class="tag">${e}</span>`).join('')}</div>
                        </div>
                        <div class="insight-item" style="grid-column: span 2;">
                            <div class="insight-label">Phone Contacts</div>
                            <div class="insight-value">${(data.contact?.phoneNumbers || [phone]).map(p => `<span class="tag">${p}</span>`).join('')}</div>
                        </div>
                    </div>
                `;

            } catch (err) {
                outputEl.textContent = "Error: " + err.message;
                visualEl.innerHTML = `<p style="color: #ef4444; text-align:center;">Could not connect to identity server.</p>`;
            } finally {
                btn.disabled = false;
                loader.style.display = "none";
            }
        }
        
        function copyToClipboard() {
            navigator.clipboard.writeText(document.getElementById('output').textContent);
            alert("JSON data copied to clipboard!");
        }
        async function fetchHistory() {
            document.getElementById('historyModal').style.display = 'flex';
            const list = document.getElementById('historyList');
            list.innerHTML = `<p style="text-align:center; color:var(--text-muted);">Fetching cluster history...</p>`;

            try {
                const response = await fetch('/history');
                const logs = await response.json();

                list.innerHTML = `
                    <table class="history-table">
                        <thead>
                            <tr><th>ID</th><th>Email</th><th>Phone</th><th>Precedence</th><th>LinkedID</th></tr>
                        </thead>
                        <tbody>
                            ${logs.map(log => `
                                <tr>
                                    <td>#${log.id}</td>
                                    <td>${log.email || '-'}</td>
                                    <td>${log.phoneNumber || '-'}</td>
                                    <td><span class="tag" style="border-color:${log.linkPrecedence === 'primary' ? 'var(--accent)' : 'var(--text-muted)'}; color:${log.linkPrecedence === 'primary' ? 'var(--accent)' : 'var(--text-muted)'}">${log.linkPrecedence}</span></td>
                                    <td>${log.linkedId ? '#' + log.linkedId : '-'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                list.innerHTML = `<p style="color:#ef4444;">Error loading database logs.</p>`;
            }
        }

        function closeHistory() { document.getElementById('historyModal').style.display = 'none'; }

        async function clearLogs() {
            if(!confirm("Are you sure? This will wipe the identity database.")) return;
            await fetch('/history/clear', { method: 'DELETE' });
            fetchHistory(); // Refresh table
        }
    </script>
</body>
</html>
